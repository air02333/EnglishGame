<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國中英文單字記憶王 - 雲端音樂完整版</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --secondary: #f39c12; 
            --hanlin-color: #8b5cf6;
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --success: #22c55e; 
            --matched-bg: #dcfce7;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle, #1e293b, #0f172a);
            color: white; margin: 0; padding: 10px; box-sizing: border-box;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.8rem; margin-bottom: 20px; text-align: center; color: #fff; text-shadow: 0 0 15px var(--primary); }

        .btn {
            display: block; width: 100%; margin: 12px 0; padding: 16px;
            font-size: 1.1rem; color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; position: relative;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); animation: wobble 0.4s ease-in-out; }

        @keyframes wobble {
            0% { transform: scale(1.05) rotate(0deg); }
            25% { transform: scale(1.05) rotate(1.5deg); }
            50% { transform: scale(1.05) rotate(-1.5deg); }
            100% { transform: scale(1.05) rotate(0deg); }
        }

        .btn-kanshiun { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
        .btn-nani { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-hanlin { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .btn-secondary { background: #475569; }

        #game-board { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 8px; margin: 15px 0; }
        .card { aspect-ratio: 1/1; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; justify-content: center; align-items: center;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem; font-weight: bold; padding: 4px; box-sizing: border-box;
            word-break: break-word; text-align: center;
        }
        
        /* 優化卡片背面 logo 顯示效果 */
        .card-front { background: #334155; padding: 12%; }
        .card-front img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            background-color: white; /* 加入白色背景襯托去背 logo */
            border-radius: 50%; /* 如果 logo 是圓的可以維持圓形，或是改為 8px 配合卡片 */
            padding: 5px; /* 讓 logo 與白色背景邊緣有間距 */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* 加入外發光，提升立體感 */
        }
        .card-back { background: white; color: #1e293b; transform: rotateY(180deg); }
        
        .card.matched { cursor: default; transform: rotateY(180deg); }
        .card.matched .card-back { background: var(--matched-bg); color: #166534; border: 2px solid var(--success); box-shadow: 0 0 10px var(--success); }

        .rank-section { margin-top: 25px; }
        .rank-header { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; cursor: pointer; }
        .rank-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: rgba(0,0,0,0.3); border-radius: 0 0 10px 10px; }
        .rank-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .rank-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .stats { font-size: 1rem; color: #facc15; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .mode-tag { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; color: white; display: inline-block; margin-bottom: 10px; }
        .practice-tag { background: #0ea5e9; }
        .match-tag { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }
        .hidden { display: none; }
    </style>
</head>

<audio id="bgMusic" loop>

</audio>

<div id="game-container">

        <h1>🎴 單字翻牌記憶王</h1>
        <button class="btn btn-kanshiun" onclick="showGrade('B1')">國一英文 (康軒下)</button>
        <button class="btn btn-nani" onclick="showGrade('B4-Nani')">國二英文 (南一下)</button>
        <button class="btn btn-hanlin" onclick="showGrade('B4-HanLin')">國二英文 (翰林下)</button>
        
        <div class="rank-section">

            <div id="rank-list-area"></div>
        </div>
    </div>

    <div id="view-mode" class="hidden">
        <h2 style="text-align:center">選擇模式</h2>
        <button class="btn btn-kanshiun" onclick="setMode('practice')">🔍 練習模式</button>
        <button class="btn match-tag" onclick="setMode('match')">🔥 比賽模式</button>
        <button class="btn btn-secondary" onclick="goBack('lobby')">返回主選單</button>
    </div>

    <div id="view-lessons" class="hidden">
        <h2 style="text-align:center">選擇課別</h2>
        <div id="lesson-buttons"></div>
        <button class="btn btn-secondary" onclick="goBack('mode')">返回</button>
    </div>

    <div id="view-groups" class="hidden">
        <h2 style="text-align:center">選擇組別</h2>
        <div id="group-buttons"></div>
        <button class="btn btn-secondary" onclick="goBack('lessons')">返回</button>
    </div>

    <div id="view-game" class="hidden">
        <div style="text-align:center"><div id="mode-indicator" class="mode-tag"></div></div>
        <div class="stats">⏱️ <span id="timer-display">0s</span> | 📈 進度 <span id="progress-display">0/0</span></div>
        <div id="game-board"></div>
        <button class="btn btn-secondary" style="padding:10px;" onclick="quitGame()">放棄並退出</button>
    </div>
</div>

    let gameState = { grade: '', mode: '', lesson: '', currentWords: [], currentIndex: 0, timer: null, seconds: 0, flipped: [], lock: false };

    async function initRanks() {
        const area = document.getElementById('rank-list-area'); 
        area.innerHTML = '⌛ 載入雲端紀錄中...';
        try {
            const res = await fetch(GAS_URL, { method: 'GET' });
            if (!res.ok) throw new Error();
            const data = await res.json();
            area.innerHTML = '';
            const currentGradeData = VOCAB[gameState.grade || 'B1'];
            Object.keys(currentGradeData).forEach(lesson => {
                const filtered = data.filter(r => r[0] === (gameState.grade || 'B1') && r[1] === lesson)
                                     .sort((a,b) => a[3] - b[3]).slice(0,3);
                const container = document.createElement('div');
                container.innerHTML = `<div class="rank-header" onclick="toggleRank(this)"><span>${lesson}</span><span>▼</span></div><div class="rank-content"><table class="rank-table">${filtered.length ? filtered.map((r,i)=>`<tr><td>#${i+1} ${r[2]}</td><td align="right">${r[3]}s</td></tr>`).join('') : '<tr><td colspan="2" align="center" style="padding:10px">尚未有紀錄</td></tr>'}</table></div>`;
                area.appendChild(container);
            });
        } catch(e) { area.innerHTML = '<span style="color:#f43f5e">❌ 無法連線雲端排行榜</span>'; }
    }

    function toggleRank(header) { const content = header.nextElementSibling; content.style.maxHeight = content.style.maxHeight ? null : "200px"; header.lastChild.innerText = content.style.maxHeight ? "▲" : "▼"; }
    function showGrade(g) { gameState.grade = g; goBack('mode'); initRanks(); }
    function goBack(target) { document.querySelectorAll('#game-container > div').forEach(d => d.classList.add('hidden')); document.getElementById(`view-${target}`).classList.remove('hidden'); }

    function setMode(m) {
        gameState.mode = m; goBack('lessons');
        const area = document.getElementById('lesson-buttons'); area.innerHTML = '';
        const btnClass = gameState.grade === 'B4-HanLin' ? 'btn-hanlin' : (gameState.grade === 'B4-Nani' ? 'btn-nani' : 'btn-kanshiun');
        Object.keys(VOCAB[gameState.grade]).forEach(l => {
            const b = document.createElement('button'); b.className = `btn ${btnClass}`; b.innerText = l; b.onclick = () => selectLesson(l); area.appendChild(b);
        });
    }

    function selectLesson(l) {
        gameState.lesson = l; const words = VOCAB[gameState.grade][l];
        const btnClass = gameState.grade === 'B4-HanLin' ? 'btn-hanlin' : (gameState.grade === 'B4-Nani' ? 'btn-nani' : 'btn-kanshiun');
        if (gameState.mode === 'practice') {
            goBack('groups'); const area = document.getElementById('group-buttons'); area.innerHTML = '';
            const num = Math.ceil(words.length / 8);
            for (let i = 0; i < num; i++) {
                const b = document.createElement('button'); b.className = `btn ${btnClass}`;
                b.innerText = `第 ${i+1} 組 (${i*8 + 1}~${Math.min((i+1)*8, words.length)})`;
                b.onclick = () => startGame(words.slice(i*8, (i+1)*8)); area.appendChild(b);
            }
        } else { startGame(words); }
    }

    function startGame(words) {
        gameState.currentWords = words; gameState.currentIndex = 0; gameState.seconds = 0;
        goBack('game');
        
        bgMusic.currentTime = 0;
        bgMusic.play().catch(e => console.log("音樂播放受阻，請點擊螢幕"));

        const tag = document.getElementById('mode-indicator');
        tag.innerText = gameState.mode === 'practice' ? '🔍 練習模式' : '🔥 比賽模式';
        tag.className = `mode-tag ${gameState.mode === 'practice' ? 'practice-tag' : 'match-tag'}`;
        
        clearInterval(gameState.timer);
        gameState.timer = setInterval(() => {
            gameState.seconds++;
            document.getElementById('timer-display').innerText = `${gameState.seconds}s`;
        }, 1000);

        loadRound();
    }

    function loadRound() {
        const board = document.getElementById('game-board'); board.innerHTML = "";
        gameState.flipped = []; gameState.lock = false;
        let pool = [], items = [];
        if (gameState.mode === 'match') { items = gameState.currentWords.slice(gameState.currentIndex, gameState.currentIndex + 8); } 
        else { items = gameState.currentWords; }

        items.forEach((w, i) => { pool.push({ id: i, txt: w.en, type: 'e' }, { id: i, txt: w.cn, type: 'c' }); });
        pool.sort(() => Math.random() - 0.5);
        pool.forEach(data => {
            const card = document.createElement('div'); card.className = 'card';
            const fontSize = data.txt.length > 15 ? '0.6rem' : (data.txt.length > 8 ? '0.75rem' : '0.85rem');
            card.innerHTML = `<div class="card-front"><img src="logo.png" onerror="this.innerHTML='?'"></div><div class="card-back" style="font-size:${fontSize}">${data.txt}</div>`;
            card.onclick = () => flip(card, data); board.appendChild(card);
        });
        const totalCount = gameState.currentWords.length;
        const currentFinish = Math.min(gameState.currentIndex + items.length, totalCount);
        document.getElementById('progress-display').innerText = `${currentFinish}/${totalCount}`;
    }

    function flip(card, data) {
        if (gameState.lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped'); gameState.flipped.push({ card, data });
        if (gameState.flipped.length === 2) {
            gameState.lock = true; const [a, b] = gameState.flipped;
            if (a.data.id === b.data.id && a.data.type !== b.data.type) {
                setTimeout(() => { 
                    a.card.classList.add('matched'); 
                    b.card.classList.add('matched'); 
                    gameState.flipped = []; gameState.lock = false; checkWin(); 
                }, 400);
            } else {
                setTimeout(() => { a.card.classList.remove('flipped'); b.card.classList.remove('flipped'); gameState.flipped = []; gameState.lock = false; }, 700);
            }
        }
    }

    function checkWin() {
        if (document.querySelectorAll('.card:not(.matched)').length === 0) {
            if (gameState.mode === 'match') {
                gameState.currentIndex += 8;
                if (gameState.currentIndex < gameState.currentWords.length) {
                    setTimeout(() => { alert("本組完成！準備挑戰下一組單字..."); loadRound(); }, 400);
                    return;
                }
            }
            setTimeout(endGame, 400);
        }
    }

    async function endGame() {
        clearInterval(gameState.timer);
        stopMusic();
        if (gameState.mode === 'match') {
            const name = prompt(`🎉 挑戰成功！總耗時：${gameState.seconds} 秒\n請輸入大名紀錄成績：`);
            if (name) {
                const payload = { grade: gameState.grade, lesson: gameState.lesson, name: name, time: gameState.seconds };
                try {
                    await fetch(GAS_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("成績已成功同步至雲端排行榜！");
                } catch(e) { alert("連線錯誤，成績僅紀錄於此。"); }
            }
        } else {
            alert(`練習完成！本次耗時：${gameState.seconds} 秒`);
        }
        location.reload();
    }

    function quitGame() { stopMusic(); location.reload(); }
    function stopMusic() { bgMusic.pause(); bgMusic.currentTime = 0; }
    initRanks();
</script>
