<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英單雲端競速賽 - 最終戰帖</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        @keyframes wobble {
            0% { transform: scale(1.05) rotate(0); }
            25% { transform: scale(1.05) rotate(1.5deg); }
            50% { transform: scale(1.05) rotate(-1.5deg); }
            100% { transform: scale(1.05) rotate(0); }
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 480px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .lesson-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        button {
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        button:hover {
            animation: wobble 0.3s ease-in-out; 
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
            filter: brightness(1.1);
        }

        button:active { transform: scale(0.95); }
        button.secondary { background: var(--secondary); }
        button.secondary:hover { box-shadow: 0 0 20px var(--secondary); }
        button.danger { background: var(--danger); }
        button.danger:hover { box-shadow: 0 0 20px var(--danger); }
        button.back { background: #475569; font-size: 0.9rem; margin-top: 20px; }

        .hidden { display: none; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--primary);
        }

        .word-display { font-size: 2.8rem; font-weight: 800; margin: 25px 0; min-height: 1.2em; }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 1.5rem;
            background: #000;
            border: 2px solid var(--primary);
            border-radius: 10px;
            color: white;
            text-align: center;
            transition: 0.3s;
        }
        input[type="text"]:focus { box-shadow: 0 0 15px var(--primary); outline: none; }

        #feedback { font-size: 1.2rem; height: 1.5em; margin: 15px 0; font-weight: bold; }
        .correct { color: var(--success); text-shadow: 0 0 10px var(--success); }
        .wrong { color: var(--danger); text-shadow: 0 0 10px var(--danger); }

        .leaderboard {
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: left;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard h4 { margin: 0 0 8px 0; color: var(--secondary); text-align: center; letter-spacing: 1px; }
        .rank-item { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 5px 0; }
        .rank-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="grade-menu">
        <h1>英單雲端競速賽</h1>
        <div class="menu-grid">
            <button onclick="loadGrade('B1')">國一英 (康軒下)</button>
            <button onclick="loadGrade('B4-Nani')">國二下 (南一)</button>
            <button onclick="loadGrade('B4-HanLin')">國二下 (翰林)</button>
        </div>
    </div>

    <div id="lesson-menu" class="hidden">
        <h2 id="grade-title">選擇課程</h2>
        <div id="lesson-buttons" class="lesson-grid"></div>
        <div id="lesson-rank" class="leaderboard">
            <h4>🏆 雲端排行榜 Top 5</h4>
            <div id="rank-list">載入中...</div>
        </div>
        <button class="back" onclick="showScreen('grade-menu')">← 返回年級</button>
    </div>

    <div id="mode-menu" class="hidden">
        <h2 id="mode-title">模式選擇</h2>
        <div class="menu-grid">
            <button class="secondary" onclick="initGame('practice')">☕ 練習模式 (無壓力)</button>
            <button class="danger" onclick="initGame('competition')">⚡ 競速比賽 (計時賽)</button>
        </div>
        <button class="back" onclick="showScreen('lesson-menu')">← 返回課程</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="game-header">
            <div>進度: <span id="progress">0/0</span></div>
            <div>時間: <span id="timer">0.00</span>s</div>
        </div>
        <div id="question" class="word-display">Ready?</div>
        <div id="input-area">
            <input type="text" id="answer-input" placeholder="請輸入英文..." autocomplete="off">
            <br><br>
            <button onclick="checkAnswer()">提交答案</button>
        </div>
        <div id="feedback"></div>
        <button class="back" onclick="cancelGame()">中斷並離開</button>
    </div>
</div>

<script>
    // 你的 Google Apps Script 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxEFt5cBsA528fNeznTyo25e5sVF2GoHzDNFM-9Z3KnitzHtO3xUkBRV8v3XXp6aZP3MA/exec";

    let allVocab = {}; 
    let activeVocab = []; 
    let currentGrade = '';
    let currentLessonName = '';
    let gameState = { mode: '', index: 0, startTime: 0, penalty: 0, interval: null };

    function showScreen(id) {
        ['grade-menu', 'lesson-menu', 'mode-menu', 'game-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function loadGrade(grade) {
        currentGrade = grade;
        const fileMap = { 'B1': 'vocab_b1.json', 'B4-Nani': 'vocab_b4_nani.json', 'B4-HanLin': 'vocab_b4_hanlin.json' };
        try {
            const res = await fetch(fileMap[grade]);
            allVocab = await res.json();
            const btnBox = document.getElementById('lesson-buttons');
            btnBox.innerHTML = '';
            Object.keys(allVocab).forEach(lesson => {
                let btn = document.createElement('button');
                btn.innerText = lesson;
                btn.onclick = () => selectLesson(lesson);
                btnBox.appendChild(btn);
            });
            showScreen('lesson-menu');
        } catch (e) { alert("讀取 JSON 失敗！請確保檔案名稱正確並位於相同目錄。"); }
    }

    function selectLesson(lesson) {
        currentLessonName = lesson;
        activeVocab = [...allVocab[lesson]].sort(() => Math.random() - 0.5);
        updateLeaderboardDisplay();
        showScreen('mode-menu');
    }

    async function updateLeaderboardDisplay() {
        const list = document.getElementById('rank-list');
        list.innerHTML = "📡 連線雲端中...";
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            // 資料格式：[年級, 課次, 名字, 時間, 日期]
            let filtered = data
                .filter(r => r[0] === currentGrade && r[1] === currentLessonName)
                .map(r => ({ name: r[2], time: parseFloat(r[3]) }))
                .sort((a, b) => a.time - b.time)
                .slice(0, 5);

            list.innerHTML = filtered.length ? filtered.map((r, i) => 
                `<div class="rank-item"><span>${i+1}. ${r.name}</span> <span>${r.time.toFixed(2)}s</span></div>`
            ).join('') : "暫無紀錄，快來搶頭香！";
        } catch (e) { list.innerHTML = "❌ 無法讀取排行榜"; }
    }

    function initGame(mode) {
        gameState.mode = mode;
        gameState.index = 0;
        gameState.penalty = 0;
        gameState.startTime = Date.now();
        
        if (mode === 'competition') {
            gameState.interval = setInterval(() => {
                const t = ((Date.now() - gameState.startTime) / 1000 + gameState.penalty).toFixed(2);
                document.getElementById('timer').innerText = t;
            }, 50);
        } else {
            document.getElementById('timer').innerText = "--";
        }
        showScreen('game-screen');
        nextQuestion();
    }

    function nextQuestion() {
        if (gameState.index >= activeVocab.length) return finishGame();
        document.getElementById('question').innerText = activeVocab[gameState.index].cn;
        document.getElementById('progress').innerText = `${gameState.index + 1}/${activeVocab.length}`;
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();
    }

    function checkAnswer() {
        const user = document.getElementById('answer-input').value.trim().toLowerCase();
        const item = activeVocab[gameState.index];
        const possible = item.en.toLowerCase().split('/');
        const isCorrect = possible.includes(user);
        const f = document.getElementById('feedback');

        if (isCorrect) {
            f.innerText = "正確！ ✨"; f.className = "correct";
            setTimeout(() => { gameState.index++; nextQuestion(); f.innerText = ""; }, 500);
        } else {
            if (gameState.mode === 'competition') gameState.penalty += 5;
            f.innerText = `答錯！${gameState.mode==='competition'?'+5s':''} (答案：${item.en})`;
            f.className = "wrong";
            setTimeout(() => { gameState.index++; nextQuestion(); f.innerText = ""; }, 1800);
        }
    }

    async function finishGame() {
        clearInterval(gameState.interval);
        const finalTime = document.getElementById('timer').innerText;
        
        if (gameState.mode === 'competition') {
            const name = prompt(`恭喜完賽！總成績：${finalTime}s\n請輸入你的名字：`) || "隱藏人物";
            const payload = { 
                grade: currentGrade, 
                lesson: currentLessonName, 
                name: name, 
                time: parseFloat(finalTime) 
            };
            
            document.getElementById('feedback').innerText = "☁️ 正在上傳成績...";
            try {
                await fetch(GAS_URL, { 
                    method: "POST", 
                    mode: 'no-cors', // 解決跨網域問題
                    body: JSON.stringify(payload) 
                });
                alert("成績已成功紀錄！");
            } catch (e) { 
                alert("同步失敗，但你的成績是 " + finalTime + "s"); 
            }
        } else {
            alert("練習結束！你已經準備好挑戰比賽了嗎？");
        }
        loadGrade(currentGrade);
    }

    function cancelGame() { 
        if(confirm("確定要放棄目前的挑戰嗎？")) {
            clearInterval(gameState.interval); 
            showScreen('lesson-menu'); 
        }
    }

    document.getElementById('answer-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>
</body>
</html>
