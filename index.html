<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國中英文單字記憶王 - 視覺進化版</title>
    <style>
        :root { 
            --primary: #4a90e2; 
            --secondary: #f39c12; 
            --hanlin-color: #8b5cf6;
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --success: #22c55e; 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle, #1e293b, #0f172a);
            color: white; margin: 0; padding: 10px; box-sizing: border-box;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 15px; text-align: center; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* --- 按鈕基礎樣式 --- */
        .btn {
            display: block; width: 100%; margin: 12px 0; padding: 16px;
            font-size: 1rem; color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; position: relative;
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- 懸停、發光、抖動效果 --- */
        .btn:hover {
            transform: scale(1.03); /* 懸停放大 */
            filter: brightness(1.1);
            animation: shake 0.5s infinite; /* 懸停抖動 */
        }

        @keyframes shake {
            0% { transform: scale(1.03) rotate(0deg); }
            25% { transform: scale(1.03) rotate(0.5deg); }
            50% { transform: scale(1.03) rotate(0deg); }
            75% { transform: scale(1.03) rotate(-0.5deg); }
            100% { transform: scale(1.03) rotate(0deg); }
        }

        /* 各版本發光與顏色 */
        .btn-kanshiun { 
            background: linear-gradient(135deg, #0ea5e9, #0284c7); 
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); 
        }
        .btn-kanshiun:hover { box-shadow: 0 0 25px rgba(14, 165, 233, 0.8); }

        .btn-nani { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); 
        }
        .btn-nani:hover { box-shadow: 0 0 25px rgba(245, 158, 11, 0.8); }

        .btn-hanlin { 
            background: linear-gradient(135deg, #8b5cf6, #6d28d9); 
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); 
        }
        .btn-hanlin:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); }

        .btn-secondary { 
            background: linear-gradient(135deg, #64748b, #475569); 
            box-shadow: 0 0 10px rgba(100, 116, 139, 0.3);
        }

        /* --- 遊戲卡片與其他樣式保持優化 --- */
        #game-board { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 8px; margin: 15px 0; }
        .card { aspect-ratio: 1/1; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; justify-content: center; align-items: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem; font-weight: bold; padding: 4px; box-sizing: border-box;
            word-break: break-word; text-align: center;
        }
        .card-front { background: #334155; }
        .card-front img { width: 85%; height: 85%; object-fit: contain; }
        .card-back { background: white; color: #1e293b; transform: rotateY(180deg); }
        .card.matched .card-back { background: #dcfce7; color: #166534; border: 2px solid var(--success); }
        
        .rank-section { margin-top: 25px; text-align: left; }
        .rank-header { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; font-size: 0.85rem; display: flex; justify-content: space-between; cursor: pointer; }
        .rank-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: rgba(0,0,0,0.3); border-radius: 0 0 10px 10px; }
        .rank-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
        .rank-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stats { font-size: 0.9rem; color: #facc15; margin-bottom: 10px; font-weight: bold; }
        .mode-tag { font-size: 0.75rem; padding: 3px 10px; border-radius: 15px; margin-bottom: 10px; display: inline-block; color: white; }
        .practice-tag { background: #0ea5e9; }
        .match-tag { background: #f43f5e; }
        .hidden { display: none; }
    </style>
</head>

<div id="game-container">
    <div id="view-lobby">
        <h1>📖 英文單字記憶王</h1>
        
        <button class="btn btn-kanshiun" onclick="showGrade('B1')">國中一年級(下)英文單字康軒版</button>
        <button class="btn btn-nani" onclick="showGrade('B4-Nani')">國中二年級下英文單字南一版</button>
        <button class="btn btn-hanlin" onclick="showGrade('B4-HanLin')">國中二年級下英文單字翰林版</button>
        
        <div class="rank-section">
            <h3 style="font-size: 0.9rem; color: #94a3b8; border-left: 4px solid var(--primary); padding-left: 8px;">🏆 本機排行榜</h3>
            <div id="rank-list-area"></div>
        </div>
    </div>

    <div id="view-mode" class="hidden">
        <h2 style="text-align:center">選擇模式</h2>
        <button class="btn btn-kanshiun" onclick="setMode('practice')">🔍 練習模式</button>
        <button class="btn match-tag" style="background:#f43f5e" onclick="setMode('match')">🔥 比賽模式</button>
        <button class="btn btn-secondary" onclick="goBack('lobby')">返回大廳</button>
    </div>

    <div id="view-lessons" class="hidden">
        <h2 style="text-align:center">選擇課別</h2>
        <div id="lesson-buttons"></div>
        <button class="btn btn-secondary" onclick="goBack('mode')">返回</button>
    </div>

    <div id="view-groups" class="hidden">
        <h2 style="text-align:center">選擇組別</h2>
        <div id="group-buttons"></div>
        <button class="btn btn-secondary" onclick="goBack('lessons')">返回</button>
    </div>

    <div id="view-game" class="hidden">
        <div id="mode-indicator" class="mode-tag"></div>
        <div class="stats">
            <span id="timer-display">0s</span> | 進度 <span id="progress-display">0/0</span>
        </div>
        <div id="game-board"></div>
        <button class="btn btn-secondary" style="padding:10px;" onclick="location.reload()">放棄並退出</button>
    </div>
</div>

            "Lesson 5": [{"en":"although","cn":"雖然"},{"en":"matter","cn":"問題"},{"en":"sore throat","cn":"喉嚨痛"},{"en":"explain","cn":"解釋"},{"en":"cough","cn":"咳嗽"},{"en":"probably","cn":"可能"},{"en":"take care of","cn":"照顧"},{"en":"noon","cn":"中午"},{"en":"both","cn":"兩者"},{"en":"medicine","cn":"藥"},{"en":"honey","cn":"蜂蜜"},{"en":"lemon","cn":"檸檬"},{"en":"useful","cn":"有用的"},{"en":"stand","cn":"攤位"},{"en":"feel like","cn":"想要"},{"en":"cold","cn":"感冒"},{"en":"well","cn":"健康的"},{"en":"treat","cn":"治療"},{"en":"head","cn":"頭"},{"en":"headache","cn":"頭痛"},{"en":"stomachache","cn":"胃痛"},{"en":"fever","cn":"發燒"},{"en":"runny nose","cn":"流鼻水"},{"en":"knee","cn":"膝蓋"},{"en":"nail","cn":"指甲"},{"en":"finger","cn":"手指"},{"en":"neck","cn":"脖子"},{"en":"shoulder","cn":"肩膀"},{"en":"bakery","cn":"麵包店"},{"en":"common","cn":"常見的"},{"en":"actually","cn":"事實上"},{"en":"helpful","cn":"有幫助的"},{"en":"root","cn":"根"},{"en":"reason","cn":"原因"},{"en":"power up","cn":"增強"},{"en":"sweet","cn":"甜食"},{"en":"sharp","cn":"敏銳的"}],
            "Lesson 6": [{"en":"pass","cn":"傳遞"},{"en":"throw","cn":"丟"},{"en":"point","cn":"得分"},{"en":"win","cn":"贏"},{"en":"until","cn":"直到"},{"en":"member","cn":"成員"},{"en":"group","cn":"團體"},{"en":"fail","cn":"失敗"},{"en":"test","cn":"考試"},{"en":"afraid","cn":"害怕的"},{"en":"forget","cn":"忘記"},{"en":"fresh","cn":"新鮮的"},{"en":"count in","cn":"算入"},{"en":"begin","cn":"開始"},{"en":"meeting","cn":"會議"},{"en":"come on","cn":"快點"},{"en":"excuse","cn":"藉口"},{"en":"around the corner","cn":"即將"},{"en":"grade","cn":"成績"},{"en":"hold back","cn":"阻止"},{"en":"few","cn":"很少"},{"en":"simple","cn":"簡單的"},{"en":"expect","cn":"期望"},{"en":"mistake","cn":"錯誤"},{"en":"angle","cn":"角度"},{"en":"allow","cn":"允許"},{"en":"laugh","cn":"笑"},{"en":"keep in mind","cn":"記住"},{"en":"honest","cn":"誠實的"},{"en":"lead to","cn":"導致"},{"en":"push","cn":"推動"},{"en":"excellent","cn":"優秀的"},{"en":"be able to","cn":"能夠"},{"en":"define","cn":"定義"},{"en":"matter","cn":"重要"},{"en":"picture","cn":"想像"},{"en":"as for","cn":"至於"},{"en":"to the full","cn":"盡可能"}]
        }
    };

    let gameState = { grade: '', mode: '', lesson: '', currentWords: [], currentIndex: 0, timer: null, seconds: 0, flipped: [], lock: false };

    function initRanks() {
        const area = document.getElementById('rank-list-area'); area.innerHTML = '';
        const gradeKey = gameState.grade || 'B1';
        const currentData = VOCAB[gradeKey];
        Object.keys(currentData).forEach(lesson => {
            const records = JSON.parse(localStorage.getItem(`rank_${gradeKey}_${lesson}`) || '[]');
            const container = document.createElement('div');
            container.innerHTML = `<div class="rank-header" onclick="toggleRank(this)"><span>${gradeKey} - ${lesson}</span><span>▼</span></div><div class="rank-content"><table class="rank-table">${records.length ? records.slice(0,3).map((r,i)=>`<tr><td>#${i+1}</td><td>${r.name}</td><td align="right">${r.time}s</td></tr>`).join(''):'<tr><td colspan="3" align="center">暫無紀錄</td></tr>'}</table></div>`;
            area.appendChild(container);
        });
    }

    function toggleRank(header) { const content = header.nextElementSibling; content.style.maxHeight = content.style.maxHeight ? null : "150px"; header.lastChild.innerText = content.style.maxHeight ? "▲" : "▼"; }

    function showGrade(g) { gameState.grade = g; goBack('mode'); initRanks(); }

    function setMode(m) {
        gameState.mode = m; goBack('lessons');
        const area = document.getElementById('lesson-buttons'); area.innerHTML = '';
        const btnClass = gameState.grade === 'B4-HanLin' ? 'btn-hanlin' : (gameState.grade === 'B4-Nani' ? 'btn-nani' : 'btn-kanshiun');
        Object.keys(VOCAB[gameState.grade]).forEach(l => {
            const b = document.createElement('button'); b.className = `btn ${btnClass}`; b.innerText = l; b.onclick = () => selectLesson(l); area.appendChild(b);
        });
    }

    function selectLesson(l) {
        gameState.lesson = l; const words = VOCAB[gameState.grade][l];
        const btnClass = gameState.grade === 'B4-HanLin' ? 'btn-hanlin' : (gameState.grade === 'B4-Nani' ? 'btn-nani' : 'btn-kanshiun');
        if (gameState.mode === 'practice') {
            goBack('groups'); const area = document.getElementById('group-buttons'); area.innerHTML = '';
            const num = Math.ceil(words.length / 8);
            for (let i = 0; i < num; i++) {
                const b = document.createElement('button'); b.className = `btn ${btnClass}`; b.innerText = `第 ${i+1} 組 (${i*8+1}~${Math.min((i+1)*8, words.length)})`;
                b.onclick = () => startGame(words.slice(i*8, (i+1)*8)); area.appendChild(b);
            }
        } else { startGame(words); }
    }

    function goBack(target) { document.querySelectorAll('#game-container > div').forEach(d => d.classList.add('hidden')); document.getElementById(`view-${target}`).classList.remove('hidden'); }

    function startGame(words) {
        gameState.currentWords = words; gameState.currentIndex = 0; gameState.seconds = 0;
        goBack('game');
        const tag = document.getElementById('mode-indicator');
        tag.innerText = gameState.mode === 'practice' ? '🔍 練習模式' : '🔥 比賽模式';
        tag.className = `mode-tag ${gameState.mode === 'practice' ? 'practice-tag' : 'match-tag'}`;
        if (gameState.mode === 'match') {
            clearInterval(gameState.timer);
            gameState.timer = setInterval(() => { gameState.seconds++; document.getElementById('timer-display').innerText = `${gameState.seconds}s`; }, 1000);
        } else { document.getElementById('timer-display').innerText = '練習中'; }
        loadRound();
    }

    function loadRound() {
        const board = document.getElementById('game-board'); board.innerHTML = "";
        gameState.flipped = []; gameState.lock = false;
        let pool = [], items = [];
        if (gameState.mode === 'match') { items = gameState.currentWords.slice(gameState.currentIndex, gameState.currentIndex + 8); gameState.currentIndex += 8; }
        else { items = gameState.currentWords; }

        items.forEach((w, i) => { pool.push({ id: i, txt: w.en, type: 'e' }, { id: i, txt: w.cn, type: 'c' }); });

        let emojiIdx = 0;
        while(pool.length < 16) {
            let emoji = AD_EMOJIS[emojiIdx % AD_EMOJIS.length];
            pool.push({ id: 99+emojiIdx, txt: `<span class="emoji-item">${emoji}</span>`, type: 'a' }, { id: 99+emojiIdx, txt: `<span class="emoji-item">${emoji}</span>`, type: 'b' });
            emojiIdx++;
        }

        pool.sort(() => Math.random() - 0.5);
        pool.forEach(data => {
            const card = document.createElement('div'); card.className = 'card';
            const len = data.txt.length;
            const fontSize = len > 15 ? '0.55rem' : (len > 10 ? '0.65rem' : (len > 7 ? '0.75rem' : '0.85rem'));
            card.innerHTML = `<div class="card-front"><img src="${logoUrl}" onerror="this.src='https://via.placeholder.com/80?text=LOGO'"></div><div class="card-back" style="font-size:${fontSize}">${data.txt}</div>`;
            card.onclick = () => flip(card, data); board.appendChild(card);
        });
        const total = gameState.mode === 'match' ? gameState.currentWords.length : items.length;
        document.getElementById('progress-display').innerText = `${Math.min(gameState.currentIndex || items.length, total)}/${total}`;
    }

    function flip(card, data) {
        if (gameState.lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped'); gameState.flipped.push({ card, data });
        if (gameState.flipped.length === 2) {
            gameState.lock = true; const [a, b] = gameState.flipped;
            if (a.data.id === b.data.id && a.data.type !== b.data.type) {
                setTimeout(() => { a.card.classList.add('matched'); b.card.classList.add('matched'); gameState.flipped = []; gameState.lock = false; checkWin(); }, 400);
            } else {
                setTimeout(() => { a.card.classList.remove('flipped'); b.card.classList.remove('flipped'); gameState.flipped = []; gameState.lock = false; }, 700);
            }
        }
    }

    function checkWin() {
        if (document.querySelectorAll('.card:not(.matched)').length === 0) {
            if (gameState.mode === 'match' && gameState.currentIndex < gameState.currentWords.length) {
                setTimeout(() => { alert("本組完成！繼續挑戰下一組。"); loadRound(); }, 400);
            } else { setTimeout(endGame, 400); }
        }
    }

    function endGame() {
        clearInterval(gameState.timer);
        if (gameState.mode === 'match') {
            const name = prompt(`🎉 恭喜完成！耗時：${gameState.seconds} 秒\n請輸入大名登入排行榜：`);
            if (name) {
                const key = `rank_${gameState.grade}_${gameState.lesson}`;
                let records = JSON.parse(localStorage.getItem(key) || '[]');
                records.push({ name, time: gameState.seconds });
                records.sort((a, b) => a.time - b.time);
                localStorage.setItem(key, JSON.stringify(records.slice(0, 10)));
            }
        } else { alert("練習模式完成！"); }
        location.reload();
    }

    initRanks();
</script>
